server:
  port: 8080

spring:
  application:
    name: publicfacility

  datasource:
    url: jdbc:h2:mem:publicfacility
    driver-class-name: org.h2.Driver
    username: sa
    password:

  h2:
    console:
      enabled: true
      path: /h2-console

  jpa:
    hibernate:
      ddl-auto: create
    show-sql: true
    properties:
      hibernate:
        format_sql: true

jwt:
  secret: "publicfacility-publicfacility-publicfacility-publicfacility-secret"
  expiration-ms: 86400000

